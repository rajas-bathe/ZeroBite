# Builds the Vite app and deploys it to GitHub Pages automatically
# every time you push to the "main" branch.
#
# One-time setup (do this after pushing this file to GitHub):
#   Repo -> Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
#
# After that, every push to main will redeploy the site automatically.
# No extra npm packages (like gh-pages) are needed.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allows manually triggering the workflow from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
